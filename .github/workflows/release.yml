name: Create Release from Changelog

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog for version
        id: changelog
        run: |
          # Expects CHANGELOG entries in Keep a Changelog format: ## [VERSION] - YYYY-MM-DD
          VERSION="${GITHUB_REF_NAME}"
          if [ ! -f CHANGELOG ]; then
            echo "CHANGELOG file not found" >&2
            exit 1
          fi
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found && NF{print}" CHANGELOG)
          if [ -z "$NOTES" ]; then
            echo "No changelog entry found for version ${VERSION}" >&2
            exit 1
          fi
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
