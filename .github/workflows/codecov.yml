name: Upload reports to Codecov
permissions:
  contents: read

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

jobs:
  upload-codecov:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/codecov.json 
      
        